<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>实习生存指南</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; color: #eee; }
.screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; position: absolute; top: 0; left: 0; transition: opacity 0.3s ease; padding: 20px; }
.screen-active { opacity: 1; }
.screen-hidden { opacity: 0; }

/* 标题画面 */
#screen-title { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
.title-logo { font-size: 3rem; margin-bottom: 10px; }
.title-name { font-size: 2rem; font-weight: bold; margin-bottom: 8px; background: linear-gradient(90deg, #4ecdc4, #44bd8e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.title-sub { font-size: 0.9rem; color: #888; margin-bottom: 40px; }
.btn { display: block; width: 200px; padding: 14px 0; margin: 8px auto; border: none; border-radius: 25px; font-size: 1rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
.btn:active { transform: scale(0.95); }
.btn-primary { background: linear-gradient(135deg, #4ecdc4, #44bd8e); color: #fff; box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3); }
.btn-secondary { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid #444; }

/* 角色选择 */
#screen-charSelect { background: linear-gradient(135deg, #1a1a2e, #16213e); }
.char-title { font-size: 1.5rem; margin-bottom: 30px; }
.char-options { display: flex; gap: 20px; }
.char-card { width: 140px; padding: 30px 20px; border-radius: 16px; text-align: center; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
.char-card:hover, .char-card:active { transform: translateY(-5px); border-color: #4ecdc4; }
.char-card-male { background: rgba(74, 144, 226, 0.15); }
.char-card-female { background: rgba(255, 107, 129, 0.15); }
.char-emoji { font-size: 3rem; margin-bottom: 10px; }
.char-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
.char-desc { font-size: 0.8rem; color: #888; }

/* 游戏主界面 */
#screen-game { background: #1a1a2e; justify-content: flex-start; padding: 0; }
#status-bar { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.3); border-bottom: 1px solid #333; flex-shrink: 0; }
.status-info { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.85rem; color: #aaa; }
.status-stats { display: flex; justify-content: space-around; font-size: 0.85rem; }
.status-stats span { padding: 2px 6px; border-radius: 10px; background: rgba(255,255,255,0.05); }
#event-container { flex: 1; width: 100%; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; justify-content: center; }
.event-title { font-size: 1.1rem; color: #4ecdc4; margin-bottom: 10px; text-align: center; }
.event-text { font-size: 0.95rem; line-height: 1.7; color: #ddd; margin-bottom: 25px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; border-left: 3px solid #4ecdc4; }
.event-choices { display: flex; flex-direction: column; gap: 10px; }
.choice-btn { width: 100%; padding: 14px 20px; border: 1px solid #3a3a5a; border-radius: 12px; background: rgba(255,255,255,0.05); color: #eee; font-size: 0.95rem; cursor: pointer; text-align: left; transition: all 0.2s; }
.choice-btn:hover, .choice-btn:active { background: rgba(78, 205, 196, 0.15); border-color: #4ecdc4; transform: translateX(5px); }
.game-menu-btn { position: fixed; top: 12px; right: 12px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: #aaa; font-size: 1.2rem; cursor: pointer; z-index: 100; }
.result-text { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; z-index: 50; }
.result-text p { font-size: 1rem; color: #ddd; margin-bottom: 20px; text-align: center; line-height: 1.6; }

/* 小游戏 */
#screen-miniGame { padding: 0; background: #000; }
#minigame-container { width: 100%; height: 100%; }

/* 结局 */
#screen-ending { background: linear-gradient(135deg, #1a1a2e, #0f3460); }
.ending-container { text-align: center; padding: 30px; }
.ending-emoji { font-size: 4rem; margin-bottom: 15px; }
.ending-title { font-size: 1.8rem; margin-bottom: 15px; color: #4ecdc4; }
.ending-desc { font-size: 0.95rem; line-height: 1.7; color: #ccc; margin-bottom: 25px; max-width: 320px; }
.ending-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 25px; font-size: 0.85rem; color: #aaa; }

/* 存档界面 */
#screen-saveLoad { background: #1a1a2e; justify-content: flex-start; padding-top: 60px; }
.save-title { font-size: 1.3rem; margin-bottom: 20px; }
.save-slot { width: 100%; max-width: 320px; padding: 16px; margin: 8px 0; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; cursor: pointer; text-align: left; color: #ddd; transition: all 0.2s; }
.save-slot:hover { border-color: #4ecdc4; }
.save-slot-empty { color: #666; font-style: italic; }
.save-actions { margin-top: 20px; display: flex; gap: 10px; }

/* 游戏菜单 */
#game-menu { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
#game-menu.active { display: flex; }
</style>
</head>
<body>

<!-- 标题画面 -->
<div id="screen-title" class="screen" style="display:flex;">
  <div class="title-logo">🐟</div>
  <div class="title-name">实习生存指南</div>
  <div class="title-sub">摸鱼是一门艺术</div>
  <button class="btn btn-primary" onclick="startNewGame()">新游戏</button>
  <button class="btn btn-secondary" onclick="showSaveLoad('load')">继续游戏</button>
  <button class="btn btn-secondary" onclick="showSaveLoad('manage')">存档管理</button>
</div>

<!-- 角色选择 -->
<div id="screen-charSelect" class="screen">
  <div class="char-title">选择你的角色</div>
  <div class="char-options">
    <div class="char-card char-card-male" onclick="game.startNew('male')">
      <div class="char-emoji">👨‍💻</div>
      <div class="char-name">余默</div>
      <div class="char-desc">座右铭：能躺绝不坐<br>特长：假装在忙</div>
    </div>
    <div class="char-card char-card-female" onclick="game.startNew('female')">
      <div class="char-emoji">👩‍💻</div>
      <div class="char-name">俞闲</div>
      <div class="char-desc">座右铭：准点下班是底线<br>特长：带薪发呆</div>
    </div>
  </div>
</div>

<!-- 游戏主界面 -->
<div id="screen-game" class="screen">
  <button class="game-menu-btn" onclick="toggleGameMenu()">☰</button>
  <div id="status-bar"></div>
  <div id="event-container"></div>
</div>

<!-- 小游戏 -->
<div id="screen-miniGame" class="screen">
  <div id="minigame-container"></div>
</div>

<!-- 结局 -->
<div id="screen-ending" class="screen"></div>

<!-- 存档界面 -->
<div id="screen-saveLoad" class="screen">
  <div class="save-title" id="save-title">存档管理</div>
  <div id="save-slots"></div>
  <div class="save-actions">
    <button class="btn btn-secondary" onclick="closeSaveLoad()" style="width:auto;padding:10px 25px;">返回</button>
  </div>
</div>

<!-- 游戏内菜单 -->
<div id="game-menu">
  <button class="btn btn-primary" onclick="resumeGame()">继续游戏</button>
  <button class="btn btn-secondary" onclick="saveGame()">手动存档</button>
  <button class="btn btn-secondary" onclick="backToTitleFromMenu()">返回标题</button>
</div>

// ============ 事件系统桥接 ============
const ALL_EVENTS = {};
for (const key in EVENTS_V2_PART1) ALL_EVENTS[key] = EVENTS_V2_PART1[key];
for (const key in EVENTS_V2_PART2) ALL_EVENTS[key] = EVENTS_V2_PART2[key];
const RANDOM_EVENTS = RANDOM_EVENTS_V2;

class EventSystem {
  getEvent(state) {
    const dayKey = 'day' + state.day;
    const dayEvents = ALL_EVENTS[dayKey];
    if (!dayEvents) return null;
    const periodEvents = dayEvents[state.period];
    if (!periodEvents || periodEvents.length === 0) return null;
    for (const evt of periodEvents) {
      if (state.eventsCompleted.includes(evt.id)) continue;
      if (evt.gender && evt.gender !== state.gender) continue;
      return evt;
    }
    return null;
  }
  getEventById(id) {
    for (const dayKey in ALL_EVENTS) {
      const day = ALL_EVENTS[dayKey];
      for (const period of ['morning', 'noon', 'afternoon', 'overtime', 'evening', 'midnight']) {
        if (!day[period]) continue;
        for (const evt of day[period]) { if (evt.id === id) return evt; }
      }
    }
    for (const evt of RANDOM_EVENTS) { if (evt.id === id) return evt; }
    return null;
  }
  getRandomEvent(state) {
    const available = RANDOM_EVENTS.filter(e => !state.eventsCompleted.includes(e.id) && Math.random() < (e.probability || 0.15));
    return available.length > 0 ? available[0] : null;
  }
  resolveChoice(state, choiceIndex) {
    const event = this.getEventById(state.currentEventId);
    if (!event || !event.choices || !event.choices[choiceIndex]) return null;
    const choice = event.choices[choiceIndex];
    return { statChanges: choice.effects || null, miniGame: event.triggerMiniGame || null, text: choice.resultText || null };
  }
}

  modifyStats(changes) {
    const stats = ['fishing', 'performance', 'happy', 'social'];
    for (const stat of stats) {
      if (changes[stat] !== undefined) {
        this[stat] = Math.max(0, Math.min(100, this[stat] + changes[stat]));
      }
    }
  }

  nextPeriod() {
    const cal = this.getCalendar();
    let periods;
    if (cal.isPromo) {
      periods = ['morning', 'noon', 'afternoon', 'evening', 'midnight'];
    } else if (cal.isWeekend) {
      periods = ['morning', 'noon', 'afternoon'];
    } else {
      periods = ['morning', 'noon', 'afternoon', 'overtime'];
    }
    const idx = periods.indexOf(this.period);
    if (idx < periods.length - 1) {
      this.period = periods[idx + 1];
    } else {
      this.day++;
      this.period = 'morning';
    }
  }

  checkGameOver() {
    if (this.performance <= 0) return 'fired';
    if (this.day > 30) return 'ended';
    return null;
  }

  serialize() {
    return JSON.stringify({
      day: this.day,
      period: this.period,
      gender: this.gender,
      playerName: this.playerName,
      fishing: this.fishing,
      performance: this.performance,
      happy: this.happy,
      social: this.social,
      flags: this.flags,
      miniGameScores: this.miniGameScores,
      currentEventId: this.currentEventId,
      eventsCompleted: this.eventsCompleted
    });
  }

  static deserialize(data) {
    const obj = typeof data === 'string' ? JSON.parse(data) : data;
    const state = new GameState();
    Object.assign(state, obj);
    return state;
  }
}

// ============ 存档系统 ============

class SaveSystem {
  static _key(slot) {
    return `intern_fish_save_${slot}`;
  }

  static save(slot, gameState) {
    const data = {
      state: gameState.serialize(),
      timestamp: Date.now(),
      summary: {
        day: gameState.day,
        period: gameState.period,
        playerName: gameState.playerName
      }
    };
    localStorage.setItem(this._key(slot), JSON.stringify(data));
  }

  static load(slot) {
    const raw = localStorage.getItem(this._key(slot));
    if (!raw) return null;
    const data = JSON.parse(raw);
    return GameState.deserialize(data.state);
  }

  static delete(slot) {
    localStorage.removeItem(this._key(slot));
  }

  static getSlotInfo() {
    const slots = [0, 1, 2, 'auto'];
    const info = {};
    for (const slot of slots) {
      const raw = localStorage.getItem(this._key(slot));
      if (raw) {
        const data = JSON.parse(raw);
        info[slot] = {
          timestamp: data.timestamp,
          ...data.summary
        };
      } else {
        info[slot] = null;
      }
    }
    return info;
  }

  static exportSave(slot) {
    const raw = localStorage.getItem(this._key(slot));
    if (!raw) return null;
    return btoa(encodeURIComponent(raw));
  }

  static importSave(base64String, slot) {
    try {
      const raw = decodeURIComponent(atob(base64String));
      JSON.parse(raw); // validate
      localStorage.setItem(this._key(slot), raw);
      return true;
    } catch (e) {
      return false;
    }
  }
}

class ScreenManager {
  static show(screenName) {
    const el = document.getElementById(`screen-${screenName}`);
    if (el) {
      el.style.display = 'flex';
      el.classList.add('screen-active');
      el.classList.remove('screen-hidden');
    }
  }

  static hide(screenName) {
    const el = document.getElementById(`screen-${screenName}`);
    if (el) {
      el.classList.add('screen-hidden');
      el.classList.remove('screen-active');
      setTimeout(() => { el.style.display = 'none'; }, 300);
    }
  }

  static transition(from, to, callback) {
    const fromEl = document.getElementById(`screen-${from}`);
    const toEl = document.getElementById(`screen-${to}`);
    if (fromEl) {
      fromEl.classList.add('screen-hidden');
      fromEl.classList.remove('screen-active');
    }
    setTimeout(() => {
      if (fromEl) fromEl.style.display = 'none';
      if (toEl) {
        toEl.style.display = 'flex';
        toEl.classList.remove('screen-hidden');
        toEl.classList.add('screen-active');
      }
      if (callback) callback();
    }, 300);
  }
}

function calculateEnding(state) {
  if (state.performance <= 0) return ENDINGS.fired;

  // 隐藏结局：三项全优
  if (state.fishing >= 75 && state.social >= 70 && state.happy >= 75 && state.performance >= 30) return ENDINGS.hidden;

  // 618战神：绩效高+摸鱼低（说明大促期间认真扛了）
  if (state.performance >= 80 && state.fishing <= 35) return ENDINGS.sixEightHero;

  // 极端单项结局
  if (state.fishing >= 85 && state.performance >= 25) return ENDINGS.fishingGod;
  if (state.performance >= 85) return ENDINGS.workaholic;
  if (state.social >= 80) return ENDINGS.socialKing;
  if (state.happy >= 85) return ENDINGS.happySlacker;

  // emo王者：快乐极低
  if (state.happy <= 15) return ENDINGS.emoKing;

  // 透明人：社交极低且摸鱼中等
  if (state.social <= 15 && state.fishing >= 40 && state.fishing <= 65) return ENDINGS.invisibleMan;

  // 救火队长：绩效较高但快乐低（一直在扛活但不开心）
  if (state.performance >= 65 && state.happy <= 30) return ENDINGS.firefighter;

  // 摸鱼不及格：四项都在中间偏下（什么都没做好）
  if (state.fishing >= 35 && state.fishing <= 55 &&
      state.performance >= 25 && state.performance <= 50 &&
      state.happy >= 25 && state.happy <= 50 &&
      state.social >= 20 && state.social <= 45) return ENDINGS.slackMaster;

  // 中庸之道：四项都在合理范围
  const allBalanced = ['fishing', 'performance', 'happy', 'social'].every(
    s => state[s] >= 30 && state[s] <= 70
  );
  if (allBalanced) return ENDINGS.balanced;

  return ENDINGS.balanced;
}

// ============ 游戏引擎 ============

class GameEngine {
  constructor() {
    this.state = new GameState();
    this.eventSystem = null;
  }

  startNew(gender) {
    this.state = new GameState();
    this.state.gender = gender;
    this.state.playerName = gender === 'male' ? '余默' : '俞闲';
    SaveSystem.save('auto', this.state);
    ScreenManager.transition('charSelect', 'game');
    this.advanceToNextEvent();
  }

  loadGame(slot) {
    const loaded = SaveSystem.load(slot);
    if (!loaded) return false;
    this.state = loaded;
    ScreenManager.transition('saveLoad', 'game');
    this.render();
    return true;
  }

  handleChoice(choiceIndex) {
    if (!this.eventSystem) return;
    const result = this.eventSystem.resolveChoice(this.state, choiceIndex);
    if (result) {
      if (result.statChanges) {
        this.state.modifyStats(result.statChanges);
      }
      if (result.flag) {
        this.state.flags[result.flag] = true;
      }
      if (result.miniGame) {
        this.triggerMiniGame(result.miniGame);
        return;
      }
      if (result.text) {
        this.showResultText(result.text, () => this.afterEvent());
        return;
      }
    }
    this.afterEvent();
  }

  afterEvent() {
    if (this.state.currentEventId) {
      this.state.eventsCompleted.push(this.state.currentEventId);
      this.state.currentEventId = null;
    }

    const gameOver = this.state.checkGameOver();
    if (gameOver === 'fired') {
      this.showEnding(ENDINGS.fired);
      return;
    }

    const prevDay = this.state.day;
    this.state.nextPeriod();

    if (this.state.day !== prevDay) {
      SaveSystem.save('auto', this.state);
      if (this.state.day > 30) {
        this.showEnding(calculateEnding(this.state));
        return;
      }
      showDayTransition(prevDay, () => this.advanceToNextEvent());
    } else {
      this.advanceToNextEvent();
    }
  }

  triggerMiniGame(type) {
    this.state._pendingMiniGame = type;
    ScreenManager.transition('game', 'miniGame', () => {
      if (window.MiniGameManager) {
        window.MiniGameManager.start(type, (score) => this.onMiniGameEnd(type, score));
      }
    });
  }

  onMiniGameEnd(type, score) {
    this.state.miniGameScores[type] = Math.max(this.state.miniGameScores[type], score);
    delete this.state._pendingMiniGame;

    const bonus = score >= 80 ? { fishing: 5, happy: 5 } :
                  score >= 50 ? { fishing: 3, happy: 3 } :
                  { happy: -2 };
    this.state.modifyStats(bonus);

    ScreenManager.transition('miniGame', 'game', () => this.afterEvent());
  }

  advanceToNextEvent() {
    // 检查emo事件
    if (this.state.happy < 20 && !this.state.flags['emo_triggered_' + this.state.day]) {
      this.state.flags['emo_triggered_' + this.state.day] = true;
      this.triggerEmoEvent();
      return;
    }

    // 20%概率随机事件
    if (Math.random() < 0.2) {
      const randomEvent = this.checkRandomEvent();
      if (randomEvent) {
        this.state.currentEventId = randomEvent.id;
        this.render();
        return;
      }
    }

    // 常规事件
    if (this.eventSystem) {
      const event = this.eventSystem.getEvent(this.state);
      if (event) {
        this.state.currentEventId = event.id;
      }
    }
    this.render();
  }

  checkRandomEvent() {
    if (!this.eventSystem) return null;
    return this.eventSystem.getRandomEvent(this.state);
  }

  triggerEmoEvent() {
    const emoChoices = [
      { text: '去天台吹吹风', effect: { happy: 10, performance: -3 } },
      { text: '找同事聊聊天', effect: { happy: 8, social: 5, performance: -2 } },
      { text: '硬撑继续工作', effect: { happy: -5, performance: 5 } }
    ];
    this.renderEvent({
      id: 'emo_' + this.state.day,
      title: '情绪低落',

        </div>
      `;
    }
  }

  showResultText(text, callback) {
    const gameScreen = document.getElementById('screen-game');
    if (!gameScreen) { callback(); return; }
    const resultDiv = document.createElement('div');
    resultDiv.className = 'result-text';
    resultDiv.innerHTML = `<p>${text}</p><button class="btn" onclick="this.parentElement.remove()">继续</button>`;
    resultDiv.querySelector('button').addEventListener('click', callback);
    gameScreen.appendChild(resultDiv);
  }

  renderEvent(event) {
    const container = document.getElementById('event-container');
    if (!container) return;
    container.innerHTML = `
      <div class="event-title">${event.title || ''}</div>
      <div class="event-text">${event.text}</div>
      <div class="event-choices">
        ${event.choices.map((c, i) => `
          <button class="choice-btn" onclick="game.handleEventChoice(${i}, ${JSON.stringify(event.choices[i].effect || {}).replace(/"/g, '&quot;')})">${c.text}</button>
        `).join('')}
      </div>
    `;
  }

  handleEventChoice(index, effect) {
    if (effect) {
      this.state.modifyStats(effect);
    }
    this.afterEvent();
  }

  render() {
    this.renderStatusBar();

    if (this.state.currentEventId && this.eventSystem) {
      const event = this.eventSystem.getEventById(this.state.currentEventId);
      if (event) {
        this.renderEvent(event);

  renderStatusBar() {

// ============================================================
// MiniGameManager - 统一管理器
// ============================================================
class MiniGameManager {
  constructor(container) {
    this.container = container;
    this.onComplete = null;
    this.currentGame = null;
  }

  start(type) {
    this.stop();
    this.container.innerHTML = '';
    this.container.style.position = 'relative';
    this.container.style.width = '100%';
    this.container.style.height = '100%';
    this.container.style.overflow = 'hidden';

    switch (type) {
      case 'bubble':
        this.currentGame = new BubbleGame(this.container, (score) => {
          if (this.onComplete) this.onComplete('bubble', score);
        });
        break;
      case 'decode':
        this.currentGame = new DecodeGame(this.container, (score) => {
          if (this.onComplete) this.onComplete('decode', score);
        });
        break;
      case 'run':
        this.currentGame = new RunGame(this.container, (score) => {
          if (this.onComplete) this.onComplete('run', score);
        });
        break;
      default:
        console.error('Unknown game type:', type);
        return;
    }

    this.currentGame.start();
  }

  stop() {
    if (this.currentGame) {
      this.currentGame.destroy();
      this.currentGame = null;
    }
    this.container.innerHTML = '';
  }
}

  start() {

    this.bindEvents();
    this.running = true;
    this.lastTime = performance.now();
    this.lastSpawnTime = 0;
    this.startTimer();
    this.loop();
  }

  createCanvas() {
    this.canvas = document.createElement('canvas');
    this.canvas.style.width = '100%';
    this.canvas.style.height = '100%';
    this.canvas.style.display = 'block';
    this.canvas.style.touchAction = 'none';
    this.container.appendChild(this.canvas);

    const rect = this.container.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    this.width = rect.width;
    this.height = rect.height;
    this.canvas.width = this.width * dpr;
    this.canvas.height = this.height * dpr;
    this.ctx = this.canvas.getContext('2d');
    this.ctx.scale(dpr, dpr);
  }

  bindEvents() {
    this.handleClick = (e) => {
      e.preventDefault();
      const rect = this.canvas.getBoundingClientRect();
      let x, y;
      if (e.touches) {
        x = e.touches[0].clientX - rect.left;
        y = e.touches[0].clientY - rect.top;
      } else {
        x = e.clientX - rect.left;
        y = e.clientY - rect.top;
      }
      this.checkHit(x, y);
    };

    this.canvas.addEventListener('touchstart', this.handleClick, { passive: false });
    this.canvas.addEventListener('mousedown', this.handleClick);
  }

  checkHit(x, y) {
    for (let i = this.bubbles.length - 1; i >= 0; i--) {
      const b = this.bubbles[i];
      if (x >= b.x - b.w / 2 && x <= b.x + b.w / 2 &&
          y >= b.y - b.h / 2 && y <= b.y + b.h / 2) {
        this.score++;
        this.createExplosion(b.x, b.y, b.color);
        this.truthPopups.push({ text: b.truth, x: b.x, y: b.y, life: 2.0, scale: 0 });
        this.bubbles.splice(i, 1);
        break;
      }
    }
  }

  createExplosion(x, y, color) {
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI * 2 * i) / 8;
      const speed = 2 + Math.random() * 3;
      this.particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        color: color,
        size: 4 + Math.random() * 4
      });
    }
  }

  spawnBubble() {
    if (this.bubbles.length >= 2) return;
    let idx;
    let attempts = 0;
    do {
      idx = Math.floor(Math.random() * this.phrases.length);
      attempts++;
    } while (this.usedIndices.includes(idx) && attempts < 20);
    this.usedIndices.push(idx);
    if (this.usedIndices.length > this.phrases.length / 2) this.usedIndices.shift();

    const item = this.phrases[idx];
    const text = item.pie;
    const fontSize = 14;
    this.ctx.font = fontSize + 'px sans-serif';
    const textWidth = this.ctx.measureText(text).width;
    const w = textWidth + 40;
    const h = 50;
    const x = Math.random() * (this.width - w) + w / 2;

    this.bubbles.push({
      x: x,
      y: -h,
      w: w,
      h: h,
      text: text,
      truth: item.truth,
      shape: item.shape,
      speed: 1.0 + Math.random() * 0.8,
      color: this.colors[Math.floor(Math.random() * this.colors.length)],
      fontSize: fontSize
    });
  }

  startTimer() {
    this.timer = setInterval(() => {
      this.timeLeft--;
      if (this.timeLeft <= 0) {
        this.endGame();
      }
    }, 1000);
  }

  loop() {
    if (!this.running) return;

    const now = performance.now();
    const dt = now - this.lastTime;
    this.lastTime = now;

    this.lastSpawnTime += dt;
    if (this.lastSpawnTime >= this.spawnInterval) {
      this.spawnBubble();
      this.lastSpawnTime = 0;
      this.spawnInterval = Math.max(1200, this.spawnInterval - 10);
    }

    this.update(dt);
    this.render();

    this.animFrame = requestAnimationFrame(() => this.loop());
  }

  update(dt) {
    for (let i = this.bubbles.length - 1; i >= 0; i--) {
      this.bubbles[i].y += this.bubbles[i].speed;
      if (this.bubbles[i].y > this.height + 50) {
        this.bubbles.splice(i, 1);
      }
    }

    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.life -= 0.03;
      if (p.life <= 0) {
        this.particles.splice(i, 1);
      }
    }

    for (let i = this.truthPopups.length - 1; i >= 0; i--) {
      const t = this.truthPopups[i];
      t.life -= 0.015;
      t.scale = Math.min(1, t.scale + 0.12);
      t.y -= 0.4;
      if (t.life <= 0) {
        this.truthPopups.splice(i, 1);
      }
    }
  }

  render() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.width, this.height);

    ctx.fillStyle = '#f0f4f8';
    ctx.fillRect(0, 0, this.width, this.height);

    // 画各种饼
    for (const b of this.bubbles) {
      ctx.save();
      ctx.translate(b.x, b.y);
      this.drawPieShape(ctx, b);
      ctx.restore();
    }

    // 粒子（碎饼渣）
    for (const p of this.particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // 真相弹窗
    for (const t of this.truthPopups) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, t.life * 2.5);
      ctx.translate(t.x, t.y);
      ctx.scale(t.scale, t.scale);
      // 背景黑框
      ctx.font = 'bold 16px sans-serif';
      const tw = ctx.measureText(t.text).width;
      ctx.fillStyle = 'rgba(0,0,0,0.85)';
      this.roundRect(ctx, -tw/2 - 12, -14, tw + 24, 32, 8);
      ctx.fill();
      // 文字
      ctx.fillStyle = '#ff4757';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(t.text, 0, 2);
      ctx.restore();
    }

    // HUD
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, this.width, 50);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('⏱ ' + this.timeLeft + 's', 15, 25);
    ctx.textAlign = 'right';
    ctx.fillText('💥 ' + this.score, this.width - 15, 25);

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('👆 戳破老板的饼！', this.width / 2, this.height - 25);
  }

  drawPieShape(ctx, b) {
    const w = b.w, h = b.h;
    switch (b.shape) {
      case 'yuanbing': // 圆饼 — 圆形，芝麻点缀
        ctx.fillStyle = '#f5d799';
        ctx.strokeStyle = '#c8a24e';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, 0, w/2, h/2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        // 芝麻
        ctx.fillStyle = '#8B7355';
        for (let i = 0; i < 5; i++) {
          ctx.fillRect(-w/4 + i*12, -3 + (i%2)*6, 3, 2);
        }
        break;
      case 'yuebing': // 月饼 — 方圆形，花纹边框
        ctx.fillStyle = '#d4872c';
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 3;
        this.roundRect(ctx, -w/2, -h/2, w, h, 12);
        ctx.fill();
        ctx.stroke();
        // 内部花纹
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 1;
        this.roundRect(ctx, -w/2+6, -h/2+6, w-12, h-12, 8);
        ctx.stroke();
        break;
      case 'shaobing': // 烧饼 — 椭圆形，焦黄带裂纹
        ctx.fillStyle = '#e8c16a';
        ctx.strokeStyle = '#b8860b';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, 0, w/2, h/2 - 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        // 焦痕
        ctx.strokeStyle = '#8B6914';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-w/6, -h/6); ctx.lineTo(w/8, h/8);
        ctx.moveTo(w/6, -h/5); ctx.lineTo(-w/8, h/6);
        ctx.stroke();
        break;
      case 'dabing': // 大饼 — 大圆，层次纹理
        ctx.fillStyle = '#f0d58c';
        ctx.strokeStyle = '#c8a24e';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, Math.min(w,h)/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        // 螺旋纹
        ctx.strokeStyle = '#d4a843';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, Math.min(w,h)/3.5, 0, Math.PI * 1.5);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, Math.min(w,h)/5, 0.5, Math.PI * 1.2);
        ctx.stroke();
        break;
      case 'xianbing': // 馅饼 — 半月形，有褶子
        ctx.fillStyle = '#f5e6c8';
        ctx.strokeStyle = '#c8a24e';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, 2, w/2, h/2 - 2, 0, 0, Math.PI);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        // 褶子
        ctx.strokeStyle = '#b8960b';
        ctx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
          const px = -w/3 + i * (w/6);
          ctx.beginPath();
          ctx.moveTo(px, -2);
          ctx.quadraticCurveTo(px + 3, -8, px + 6, -2);
          ctx.stroke();
        }
        break;
    }
    // 文字
    ctx.fillStyle = '#333';
    ctx.font = 'bold ' + b.fontSize + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.text, 0, b.shape === 'xianbing' ? 8 : 0);
  }

  roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  endGame() {
    this.running = false;
    if (this.animFrame) cancelAnimationFrame(this.animFrame);
    if (this.timer) clearInterval(this.timer);

    let finalScore;
    if (this.score >= 16) finalScore = 3;
    else if (this.score >= 6) finalScore = 2;
    else finalScore = 1;

    this.showResult(finalScore);
  }

  showResult(finalScore) {
    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 100;
    `;

    const labels = ['', '菜鸟级', '老油条级', '戳饼大师级'];
    overlay.innerHTML = `
      <div style="background: white; border-radius: 16px; padding: 30px 40px; text-align: center;">
        <div style="font-size: 48px; margin-bottom: 10px;">🫓</div>
        <div style="font-size: 22px; font-weight: bold; margin-bottom: 8px;">戳破了 ${this.score} 个饼</div>
        <div style="font-size: 16px; color: #666; margin-bottom: 20px;">${labels[finalScore]}</div>
        <button id="bubble-continue-btn" style="
          padding: 12px 40px; font-size: 16px; border: none;
          background: #4a90d9; color: white; border-radius: 25px; cursor: pointer;
        ">继续</button>
      </div>
    `;

    this.container.appendChild(overlay);

    const btn = document.getElementById('bubble-continue-btn');
    btn.addEventListener('click', () => {
      if (this.onComplete) this.onComplete(finalScore);
    });
    btn.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (this.onComplete) this.onComplete(finalScore);
    });
  }

  destroy() {
    this.running = false;
    if (this.animFrame) cancelAnimationFrame(this.animFrame);
    if (this.timer) clearInterval(this.timer);
    if (this.canvas) {
      this.canvas.removeEventListener('touchstart', this.handleClick);
      this.canvas.removeEventListener('mousedown', this.handleClick);
    }
  }
}

  start() {

    this.selectPairs();
    this.createDOM();

  }

  selectPairs() {
    const shuffled = [...this.allPairs].sort(() => Math.random() - 0.5);
    this.pairs = shuffled.slice(0, 6);
    this.rightOrder = [...this.pairs].sort(() => Math.random() - 0.5);
  }

  createDOM() {
    const wrapper = document.createElement('div');
    wrapper.id = 'decode-wrapper';
    wrapper.style.cssText = `
      width: 100%; height: 100%; display: flex; flex-direction: column;
      background: #1a1a2e; padding: 0; box-sizing: border-box;

    hud.style.cssText = `
      display: flex; justify-content: space-between; align-items: center;

      <span id="decode-combo" style="color: #ffd700; display: none;">连击!</span>
    `;
    wrapper.appendChild(hud);

    const title = document.createElement('div');
    title.style.cssText = 'text-align: center; color: #aaa; font-size: 13px; padding: 4px 0; flex-shrink: 0;';
    title.textContent = '每句黑话背后，都是一个被互联网腌入味的打工人';
    wrapper.appendChild(title);

    const canvasWrap = document.createElement('div');
    canvasWrap.style.cssText = 'flex: 1; position: relative; padding: 8px 0;';
    wrapper.appendChild(canvasWrap);

    this.container.appendChild(wrapper);

    const content = document.createElement('div');
    content.style.cssText = `
      position: absolute; inset: 0; display: flex; justify-content: space-between;
      padding: 0 12px; align-items: stretch;
    `;
    canvasWrap.appendChild(content);

    const leftCol = document.createElement('div');
    leftCol.style.cssText = 'display: flex; flex-direction: column; justify-content: space-around; width: 42%; gap: 4px;';
    content.appendChild(leftCol);

    const rightCol = document.createElement('div');
    rightCol.style.cssText = 'display: flex; flex-direction: column; justify-content: space-around; width: 42%; gap: 4px;';
    content.appendChild(rightCol);

    this.canvas = document.createElement('canvas');
    this.canvas.style.cssText = 'position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;';
    canvasWrap.appendChild(this.canvas);

    this.leftCards = [];
    this.rightCards = [];

    this.pairs.forEach((pair, idx) => {
      const card = this.createCard(pair.black, 'left', idx);
      leftCol.appendChild(card);
      this.leftCards.push(card);
    });

    this.rightOrder.forEach((pair) => {
      const originalIdx = this.pairs.indexOf(pair);
      const card = this.createCard(pair.truth, 'right', originalIdx);
      rightCol.appendChild(card);
      this.rightCards.push(card);
    });

    requestAnimationFrame(() => {
      const rect = canvasWrap.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      this.canvas.width = rect.width * dpr;
      this.canvas.height = rect.height * dpr;
      this.ctx = this.canvas.getContext('2d');
      this.ctx.scale(dpr, dpr);
      this.canvasRect = rect;
    });
  }

  createCard(text, side, pairIndex) {
    const card = document.createElement('div');
    card.dataset.side = side;
    card.dataset.pairIndex = pairIndex;
    const isLeft = side === 'left';
    card.style.cssText = `
      background: ${isLeft ? '#16213e' : '#2d1810'};
      border: 2px solid ${isLeft ? '#4a7eb5' : '#d4831a'};
      border-radius: 10px; padding: 8px 6px; text-align: center;
      color: white; font-size: 12px; cursor: pointer;
      transition: all 0.2s ease; user-select: none;
      display: flex; align-items: center; justify-content: center;
      min-height: 36px; position: relative;
    `;
    card.textContent = text;

    const handler = (e) => {
      e.preventDefault();
      if (!this.running) return;
      this.handleCardClick(card, side, pairIndex);
    };
    card.addEventListener('click', handler);
    card.addEventListener('touchend', (e) => { e.preventDefault(); handler(e); });
    return card;
  }

  handleCardClick(card, side, pairIndex) {
    if (card.dataset.matched === 'true') return;
    if (side === 'left') {
      if (this.selectedLeft) { this.selectedLeft.style.transform = ''; this.selectedLeft.style.boxShadow = ''; }
      this.selectedLeft = card;
      this.selectedLeftIndex = pairIndex;
      card.style.transform = 'scale(1.05)';
      card.style.boxShadow = '0 0 12px rgba(74, 126, 181, 0.8)';
    } else {
      if (this.selectedRight) { this.selectedRight.style.transform = ''; this.selectedRight.style.boxShadow = ''; }
      this.selectedRight = card;
      this.selectedRightIndex = pairIndex;
      card.style.transform = 'scale(1.05)';
      card.style.boxShadow = '0 0 12px rgba(212, 131, 26, 0.8)';
    }
    if (this.selectedLeft && this.selectedRight) this.checkMatch();
  }

  checkMatch() {
    const leftCard = this.selectedLeft;
    const rightCard = this.selectedRight;
    const leftIdx = this.selectedLeftIndex;
    const rightIdx = this.selectedRightIndex;
    this.selectedLeft = null;
    this.selectedRight = null;

    if (leftIdx === rightIdx) {
      this.combo++;
      this.score += this.combo;
      this.matchedPairs++;
      leftCard.dataset.matched = 'true';
      rightCard.dataset.matched = 'true';
      this.drawLine(leftCard, rightCard, true);
      leftCard.style.background = 'rgba(40, 167, 69, 0.3)';
      leftCard.style.border = '2px solid #28a745';
      leftCard.style.transform = '';
      leftCard.style.boxShadow = '0 0 20px rgba(40, 167, 69, 0.6)';
      rightCard.style.background = 'rgba(40, 167, 69, 0.3)';
      rightCard.style.border = '2px solid #28a745';
      rightCard.style.transform = '';
      rightCard.style.boxShadow = '0 0 20px rgba(40, 167, 69, 0.6)';
      this.showSuccessEffect(leftCard);
      if (this.combo > 1) {
        const comboEl = document.getElementById('decode-combo');
        if (comboEl) { comboEl.style.display = 'inline'; comboEl.textContent = this.combo + '连击!'; setTimeout(() => { comboEl.style.display = 'none'; }, 800); }
      }
      this.updateScore();
      if (this.matchedPairs >= 6) setTimeout(() => this.endGame(), 600);
    } else {
      this.combo = 0;
      this.drawLine(leftCard, rightCard, false);
      this.shakeCard(leftCard);
      this.shakeCard(rightCard);
    }
  }

  drawLine(leftCard, rightCard, success) {
    if (!this.ctx || !this.canvasRect) return;
    const ctx = this.ctx;
    const cr = this.canvasRect;
    const lr = leftCard.getBoundingClientRect();
    const rr = rightCard.getBoundingClientRect();
    const x1 = lr.right - cr.left;
    const y1 = lr.top + lr.height / 2 - cr.top;
    const x2 = rr.left - cr.left;
    const y2 = rr.top + rr.height / 2 - cr.top;

    if (success) this.lines.push({ x1, y1, x2, y2 });
    this.redrawLines();

    if (!success) {
      ctx.save();
      ctx.strokeStyle = '#dc3545';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.restore();
      setTimeout(() => this.redrawLines(), 400);
    }
  }

  redrawLines() {
    if (!this.ctx) return;
    const ctx = this.ctx;
    const w = this.canvas.width / (window.devicePixelRatio || 1);
    const h = this.canvas.height / (window.devicePixelRatio || 1);
    ctx.clearRect(0, 0, w, h);
    for (const line of this.lines) {
      ctx.save();
      ctx.strokeStyle = '#28a745';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#28a745';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(line.x1, line.y1);
      ctx.lineTo(line.x2, line.y2);
      ctx.stroke();
      ctx.restore();
    }
  }

  showSuccessEffect(card) {
    const wrapper = document.getElementById('decode-wrapper');
    if (!wrapper) return;
    const cr = wrapper.getBoundingClientRect();
    const lr = card.getBoundingClientRect();
    const cx = lr.right - cr.left;
    const cy = lr.top + lr.height/2 - cr.top;
    for (let i = 0; i < 8; i++) {
      const p = document.createElement('div');
      const size = 5 + Math.random() * 5;
      const angle = (Math.PI * 2 * i) / 8;
      const dist = 25 + Math.random() * 20;
      p.style.cssText = `position:absolute;width:${size}px;height:${size}px;background:#4ecdc4;border-radius:50%;left:${cx}px;top:${cy}px;transition:all 0.5s ease-out;opacity:1;z-index:20;pointer-events:none;`;
      wrapper.appendChild(p);
      requestAnimationFrame(() => { p.style.left=(cx+Math.cos(angle)*dist)+'px'; p.style.top=(cy+Math.sin(angle)*dist)+'px'; p.style.opacity='0'; p.style.transform='scale(0)'; });
      setTimeout(() => p.remove(), 600);
    }
  }

  shakeCard(card) {
    card.style.border = '2px solid #dc3545';
    card.style.animation = 'shake 0.4s ease';
    card.style.boxShadow = '0 0 10px rgba(220, 53, 69, 0.5)';
    setTimeout(() => { card.style.border = card.dataset.side === 'left' ? '2px solid #4a7eb5' : '2px solid #d4831a'; card.style.animation = ''; card.style.transform = ''; card.style.boxShadow = ''; }, 400);
  }

  updateScore() {
    const scoreEl = document.getElementById('decode-score');
    if (scoreEl) scoreEl.textContent = '得分: ' + this.score;
  }

  startTimer() {
    this.timer = setInterval(() => {
      this.timeLeft--;
      const timeEl = document.getElementById('decode-time');
      if (timeEl) timeEl.textContent = '⏱ ' + this.timeLeft + 's';
      if (this.timeLeft <= 0) this.endGame();
    }, 1000);
    if (!document.getElementById('decode-styles')) {
      const style = document.createElement('style');
      style.id = 'decode-styles';
      style.textContent = '@keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }';
      document.head.appendChild(style);
    }
  }

  endGame() {
    this.running = false;
    if (this.timer) clearInterval(this.timer);
    let finalScore;
    if (this.matchedPairs >= 6) finalScore = 3;
    else if (this.matchedPairs >= 3) finalScore = 2;
    else finalScore = 1;
    this.showResult(finalScore);
  }

  showResult(finalScore) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;';
    const labels = ['', '职场小白', '黑话达人', '解码大师'];
    overlay.innerHTML = '<div style="background:#1a1a2e;border:1px solid #444;border-radius:16px;padding:30px 40px;text-align:center;"><div style="font-size:48px;margin-bottom:10px;">🔍</div><div style="font-size:22px;font-weight:bold;color:white;margin-bottom:8px;">配对成功 ' + this.matchedPairs + ' 组</div><div style="font-size:16px;color:#aaa;margin-bottom:20px;">' + labels[finalScore] + '</div><button style="padding:12px 40px;font-size:16px;border:none;background:#e8a838;color:white;border-radius:25px;cursor:pointer;">继续</button></div>';
    document.body.appendChild(overlay);
    const btn = overlay.querySelector('button');
    const complete = () => { overlay.remove(); if (this.onComplete) this.onComplete(finalScore); };
    btn.addEventListener('click', complete);
    btn.addEventListener('touchend', (e) => { e.preventDefault(); complete(); });
  }

  destroy() { this.running = false; if (this.timer) clearInterval(this.timer); }
}

class RunGame {
  constructor(container, onComplete) {
    this.container = container;
    this.onComplete = onComplete;
    this.canvas = null;
    this.ctx = null;
    this.animFrame = null;
    this.timer = null;
    this.timeLeft = 25;
    this.survivalTime = 0;
    this.running = false;
    this.gameOver = false;
    this.gender = (window.game && window.game.state) ? window.game.state.gender : 'male';

    this.gravity = 0.6;
    this.jumpForce = -11;
    this.groundY = 0;
    this.speed = 3.5;
    this.maxSpeed = 7;

    this.player = { x: 70, y: 0, w: 24, h: 32, vy: 0, onGround: true, jumps: 0, maxJumps: 2, frame: 0, frameTimer: 0 };
    this.boss = { x: -60, y: 0, w: 28, h: 36, frame: 0, frameTimer: 0, speed: 0, catchUp: false };

    this.obstacles = [];
    this.obstacleTimer = 0;
    this.minSpawnInterval = 1400;
    this.bgOffset = 0;
    this.floorOffset = 0;
    this.stars = [];

    this.obstacleTypes = [
      { emoji: '📄', label: '需求文档', type: 'low', w: 24, h: 28 },
      { emoji: '📅', label: '会议邀请', type: 'high', w: 28, h: 44 },
      { emoji: '💬', label: '"在吗"', type: 'air', w: 28, h: 24 },
      { emoji: '📧', label: '全员邮件', type: 'double', w: 24, h: 28 },
      { emoji: '⏰', label: '加班通知', type: 'low', w: 24, h: 28 },
      { emoji: '📊', label: 'PPT', type: 'high', w: 28, h: 44 }
    ];

    for (let i = 0; i < 30; i++) {
      this.stars.push({ x: Math.random() * 400, y: Math.random() * 200, size: 1 + Math.random() * 2, speed: 0.2 + Math.random() * 0.5 });
    }
  }

  start() {
    this.createCanvas();
    this.bindEvents();
    this.running = true;
    this.gameOver = false;
    this.groundY = this.height - 60;
    this.player.y = this.groundY - this.player.h;
    this.boss.y = this.groundY - this.boss.h;
    this.lastTime = performance.now();
    this.startTimer();
    this.loop();
  }

  createCanvas() {
    this.canvas = document.createElement('canvas');
    this.canvas.style.cssText = 'width:100%;height:100%;display:block;touch-action:none;image-rendering:pixelated;';
    this.container.appendChild(this.canvas);
    const rect = this.container.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    this.width = rect.width;
    this.height = rect.height;
    this.canvas.width = this.width * dpr;
    this.canvas.height = this.height * dpr;
    this.ctx = this.canvas.getContext('2d');
    this.ctx.scale(dpr, dpr);
    this.ctx.imageSmoothingEnabled = false;
  }

  bindEvents() {
    this.handleJump = (e) => { e.preventDefault(); if (!this.running || this.gameOver) return; this.jump(); };
    this.handleKey = (e) => { if (e.code === 'Space' || e.key === ' ') { e.preventDefault(); if (!this.running || this.gameOver) return; this.jump(); } };
    this.canvas.addEventListener('touchstart', this.handleJump, { passive: false });
    this.canvas.addEventListener('mousedown', this.handleJump);
    document.addEventListener('keydown', this.handleKey);
  }

  jump() {
    if (this.player.jumps < this.player.maxJumps) {
      this.player.vy = this.jumpForce;
      this.player.onGround = false;
      this.player.jumps++;
    }
  }

  startTimer() {
    this.timer = setInterval(() => {
      this.timeLeft--;
      this.survivalTime++;
      if (this.survivalTime % 5 === 0 && this.speed < this.maxSpeed) this.speed += 0.6;
      // 老板越来越近
      this.boss.speed = Math.min(this.speed - 0.5, this.speed * (0.7 + this.survivalTime * 0.01));
      if (this.timeLeft <= 0) this.endGame(false);
    }, 1000);
  }

  spawnObstacle() {
    const typeIdx = Math.floor(Math.random() * this.obstacleTypes.length);
    const type = this.obstacleTypes[typeIdx];
    if (type.type === 'double') {
      this.obstacles.push({ x: this.width + 10, y: this.groundY - type.h, w: type.w, h: type.h, emoji: type.emoji, kind: 'low' });
      this.obstacles.push({ x: this.width + 50, y: this.groundY - type.h, w: type.w, h: type.h, emoji: type.emoji, kind: 'low' });
    } else if (type.type === 'air') {
      this.obstacles.push({ x: this.width + 10, y: this.groundY - 70 - type.h, w: type.w, h: type.h, emoji: type.emoji, kind: 'air' });
    } else if (type.type === 'high') {
      this.obstacles.push({ x: this.width + 10, y: this.groundY - type.h, w: type.w, h: type.h, emoji: type.emoji, kind: 'high' });
    } else {
      this.obstacles.push({ x: this.width + 10, y: this.groundY - type.h, w: type.w, h: type.h, emoji: type.emoji, kind: 'low' });
    }
  }

  loop() {
    if (!this.running) return;
    const now = performance.now();
    const dt = now - this.lastTime;
    this.lastTime = now;
    this.update(dt);
    this.render();
    this.animFrame = requestAnimationFrame(() => this.loop());
  }

  update(dt) {
    if (this.gameOver) return;
    // Player physics
    this.player.vy += this.gravity;
    this.player.y += this.player.vy;
    if (this.player.y >= this.groundY - this.player.h) {
      this.player.y = this.groundY - this.player.h;
      this.player.vy = 0;
      this.player.onGround = true;
      this.player.jumps = 0;
    }
    this.player.frameTimer += dt;
    if (this.player.frameTimer > 120) { this.player.frame = (this.player.frame + 1) % 4; this.player.frameTimer = 0; }

    // Boss追赶
    this.boss.frameTimer += dt;
    if (this.boss.frameTimer > 150) { this.boss.frame = (this.boss.frame + 1) % 4; this.boss.frameTimer = 0; }
    const targetBossX = this.player.x - 55 - (20 - this.survivalTime) * 1.5;
    this.boss.x += (targetBossX - this.boss.x) * 0.02;
    if (this.boss.x > this.player.x - 30) { this.endGame(true); return; }

    // Obstacles
    this.obstacleTimer += dt;
    const spawnInterval = Math.max(800, this.minSpawnInterval - this.survivalTime * 25);
    if (this.obstacleTimer >= spawnInterval) { this.spawnObstacle(); this.obstacleTimer = 0; }
    for (let i = this.obstacles.length - 1; i >= 0; i--) {
      this.obstacles[i].x -= this.speed;
      if (this.obstacles[i].x < -50) this.obstacles.splice(i, 1);
    }
    // Collision
    for (const obs of this.obstacles) {
      if (this.checkCollision(this.player, obs)) { this.endGame(true); return; }
    }
    // BG
    this.bgOffset = (this.bgOffset + this.speed * 0.3) % 120;
    this.floorOffset = (this.floorOffset + this.speed) % 16;
    for (const s of this.stars) { s.x -= s.speed; if (s.x < 0) s.x = this.width; }
  }

  checkCollision(p, obs) {
    const s = 4;
    return p.x + s < obs.x + obs.w && p.x + p.w - s > obs.x && p.y + s < obs.y + obs.h && p.y + p.h - s > obs.y;
  }

  render() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.width, this.height);

    // 像素风天空渐变
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, this.width, this.height);
    // 星星
    ctx.fillStyle = '#555';
    for (const s of this.stars) { ctx.fillRect(Math.floor(s.x), Math.floor(s.y), s.size, s.size); }

    // 背景建筑剪影（像素风）
    ctx.fillStyle = '#252540';
    for (let i = 0; i < 6; i++) {
      const bx = ((i * 120) - this.bgOffset + 720) % (this.width + 120) - 60;
      const bh = 40 + (i % 3) * 25;
      ctx.fillRect(Math.floor(bx), this.groundY - bh, 50, bh);
      ctx.fillRect(Math.floor(bx) + 10, this.groundY - bh - 15, 30, 15);
      // 窗户
      ctx.fillStyle = '#3a3a5a';
      for (let wy = 0; wy < 3; wy++) {
        for (let wx = 0; wx < 2; wx++) {
          ctx.fillRect(Math.floor(bx) + 8 + wx * 20, this.groundY - bh + 8 + wy * 14, 6, 6);
        }
      }
      ctx.fillStyle = '#252540';
    }

    // 地面（像素格子）
    ctx.fillStyle = '#3d3d5c';
    ctx.fillRect(0, this.groundY, this.width, this.height - this.groundY);
    ctx.fillStyle = '#4a4a6a';
    for (let x = -this.floorOffset; x < this.width; x += 16) {
      for (let y = this.groundY; y < this.height; y += 16) {
        if ((Math.floor(x / 16) + Math.floor(y / 16)) % 2 === 0) ctx.fillRect(x, y, 16, 16);
      }
    }

    // 老板（像素风）
    this.drawBoss(ctx);
    // 玩家
    this.drawPlayer(ctx);
    // 障碍物
    for (const obs of this.obstacles) {
      ctx.font = (obs.w - 4) + 'px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(obs.emoji, obs.x + obs.w / 2, obs.y + obs.h);
    }

    // HUD
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, this.width, 44);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('⏱ ' + this.timeLeft + 's', 12, 22);
    ctx.textAlign = 'center';
    ctx.fillText('🏃 ' + this.survivalTime + '秒', this.width / 2, 22);
    ctx.textAlign = 'right';
    // 老板距离指示
    const dist = Math.max(0, Math.floor(this.player.x - this.boss.x - 30));
    const distColor = dist < 20 ? '#ff4757' : dist < 40 ? '#ffa502' : '#2ed573';
    ctx.fillStyle = distColor;
    ctx.fillText('老板距离: ' + dist + 'px', this.width - 12, 22);

    if (this.survivalTime < 3) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('点击屏幕跳跃 | 可二段跳 | 别被老板追上！', this.width / 2, this.height - 14);
    }
  }

  drawPlayer(ctx) {
    const p = this.player;
    const x = Math.floor(p.x);
    const y = Math.floor(p.y);
    const isMale = this.gender === 'male';
    const isJumping = !p.onGround;
    const f = p.frame;

    // 头
    ctx.fillStyle = '#ffd5a0';
    ctx.fillRect(x + 8, y, 8, 8);
    // 头发
    ctx.fillStyle = isMale ? '#4a3728' : '#2d1b0e';
    ctx.fillRect(x + 8, y - 2, 8, 3);
    if (!isMale) { ctx.fillRect(x + 6, y, 2, 6); ctx.fillRect(x + 16, y, 2, 6); }
    // 眼
    ctx.fillStyle = '#333';
    ctx.fillRect(x + 10, y + 3, 2, 2);
    ctx.fillRect(x + 14, y + 3, 2, 2);
    // 身体
    ctx.fillStyle = isMale ? '#4a90d9' : '#ff6b81';
    ctx.fillRect(x + 6, y + 8, 12, 12);
    // 手臂
    ctx.fillStyle = '#ffd5a0';
    if (isJumping) {
      ctx.fillRect(x + 4, y + 6, 4, 3);
      ctx.fillRect(x + 16, y + 6, 4, 3);
    } else {
      const armOff = (f % 2 === 0) ? 2 : -2;
      ctx.fillRect(x + 4, y + 9 + armOff, 3, 6);
      ctx.fillRect(x + 17, y + 9 - armOff, 3, 6);
    }
    // 裤子
    ctx.fillStyle = isMale ? '#2c3e50' : '#2c3e50';
    ctx.fillRect(x + 6, y + 20, 12, 6);
    // 腿
    ctx.fillStyle = isMale ? '#2c3e50' : '#ffd5a0';
    if (isJumping) {
      ctx.fillRect(x + 7, y + 26, 4, 4);
      ctx.fillRect(x + 13, y + 26, 4, 4);
    } else {
      const legOff = (f < 2) ? 3 : -3;
      ctx.fillRect(x + 7, y + 26, 4, 4 + legOff);
      ctx.fillRect(x + 13, y + 26, 4, 4 - legOff);
    }
    // 鞋
    ctx.fillStyle = '#333';
    const shoeY = isJumping ? y + 30 : y + 30 + ((f < 2) ? 2 : -2);
    ctx.fillRect(x + 6, shoeY, 5, 2);
    ctx.fillRect(x + 13, isJumping ? y + 30 : y + 30 - ((f < 2) ? 2 : -2), 5, 2);
  }

  drawBoss(ctx) {
    const b = this.boss;
    const x = Math.floor(b.x);
    const y = Math.floor(b.y);
    const f = b.frame;

    // 头（更大）
    ctx.fillStyle = '#ffd5a0';
    ctx.fillRect(x + 8, y - 2, 12, 10);
    // 头发（地中海）
    ctx.fillStyle = '#333';
    ctx.fillRect(x + 8, y - 4, 12, 3);
    ctx.fillRect(x + 8, y - 2, 3, 4);
    ctx.fillRect(x + 17, y - 2, 3, 4);
    // 墨镜
    ctx.fillStyle = '#111';
    ctx.fillRect(x + 10, y + 2, 4, 3);
    ctx.fillRect(x + 15, y + 2, 4, 3);
    // 嘴（怒）
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(x + 12, y + 6, 4, 2);
    // 身体（西装）
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(x + 6, y + 10, 16, 14);
    // 领带
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(x + 13, y + 10, 3, 10);
    // 手（追赶姿态）
    ctx.fillStyle = '#ffd5a0';
    const reach = (f % 2 === 0) ? 4 : 0;
    ctx.fillRect(x + 22 + reach, y + 12, 5, 3);
    ctx.fillRect(x + 22 + (4 - reach), y + 16, 5, 3);
    // 腿
    ctx.fillStyle = '#111';
    const legOff = (f < 2) ? 3 : -3;
    ctx.fillRect(x + 8, y + 24, 5, 6 + legOff);
    ctx.fillRect(x + 15, y + 24, 5, 6 - legOff);
    // 鞋
    ctx.fillStyle = '#222';
    ctx.fillRect(x + 7, y + 30 + legOff, 6, 3);
    ctx.fillRect(x + 14, y + 30 - legOff, 6, 3);

    // 追赶怒气特效
    if (this.survivalTime > 10) {
      ctx.fillStyle = '#ff4757';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      const angryText = ['💢', '‼️', '🔥'][f % 3];
      ctx.fillText(angryText, x + 14, y - 8);
    }
  }

  endGame(caught) {
    this.gameOver = true;
    this.running = false;
    if (this.animFrame) cancelAnimationFrame(this.animFrame);
    if (this.timer) clearInterval(this.timer);

    if (caught) {
      // 被追上/撞障碍的失败动画
      this.showCaughtAnimation(() => {
        const survived = this.survivalTime;
        let finalScore;
        if (survived >= 18) finalScore = 3;
        else if (survived >= 10) finalScore = 2;
        else finalScore = 1;
        this.showResult(finalScore, survived, true);
      });
    } else {
      this.showResult(3, this.survivalTime, false);
    }
  }

  showCaughtAnimation(callback) {
    const ctx = this.ctx;
    // 闪红 + 显示失败图
    let flash = 0;
    const flashInterval = setInterval(() => {
      ctx.fillStyle = flash % 2 === 0 ? 'rgba(255, 0, 0, 0.3)' : 'rgba(0, 0, 0, 0)';
      ctx.fillRect(0, 0, this.width, this.height);
      flash++;
      if (flash >= 4) {
        clearInterval(flashInterval);
        // 画失败场景
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, this.width, this.height);
        ctx.fillStyle = '#ff4757';
        ctx.font = 'bold 28px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('摸鱼失败！', this.width / 2, this.height / 2 - 40);
        ctx.fillStyle = '#fff';
        ctx.font = '16px monospace';
        ctx.fillText('被老板逮个正着...', this.width / 2, this.height / 2);
        // 像素风老板大脸
        ctx.font = '60px serif';
        ctx.fillText('👔💢', this.width / 2, this.height / 2 + 60);
        setTimeout(callback, 1200);
      }
    }, 100);
  }

  showResult(finalScore, survived, caught) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;';
    const labels = ['', '加班奴隶', '摸鱼学徒', '逃离大师'];
    const reason = caught ? '被老板追上了...' : '成功甩掉老板！自由了！';
    const emoji = caught ? '😵' : '🎉';
    overlay.innerHTML = `<div style="background:#1a1a2e;border:1px solid #555;border-radius:16px;padding:30px;text-align:center;">
      <div style="font-size:48px;margin-bottom:10px;">${emoji}</div>
      <div style="font-size:16px;color:#aaa;margin-bottom:5px;">${reason}</div>
      <div style="font-size:22px;font-weight:bold;color:white;margin-bottom:8px;">存活 ${survived} 秒</div>
      <div style="font-size:16px;color:#aaa;margin-bottom:20px;">${labels[finalScore]}</div>
      <button style="padding:12px 40px;font-size:16px;border:none;background:#28a745;color:white;border-radius:25px;cursor:pointer;">继续</button>
    </div>`;
    document.body.appendChild(overlay);
    const btn = overlay.querySelector('button');
    const complete = () => { overlay.remove(); if (this.onComplete) this.onComplete(finalScore); };
    btn.addEventListener('click', complete);
    btn.addEventListener('touchend', (e) => { e.preventDefault(); complete(); });
  }

  destroy() {
    this.running = false;
    this.gameOver = true;
    if (this.animFrame) cancelAnimationFrame(this.animFrame);
    if (this.timer) clearInterval(this.timer);
    if (this.canvas) { this.canvas.removeEventListener('touchstart', this.handleJump); this.canvas.removeEventListener('mousedown', this.handleJump); }
    document.removeEventListener('keydown', this.handleKey);
  }
}

window.MiniGameManager = MiniGameManager;


// ============ 初始化 ============
game.eventSystem = new EventSystem();

// 小游戏管理器实例化
const miniGameContainer = document.getElementById('minigame-container');
const miniGameMgr = new MiniGameManager(miniGameContainer);

// 覆盖 GameEngine 的 triggerMiniGame
GameEngine.prototype.triggerMiniGame = function(type) {
  ScreenManager.transition('game', 'miniGame', () => {
    miniGameMgr.onComplete = (gameType, score) => {
      miniGameMgr.stop();
      this.onMiniGameEnd(gameType, score);
    };
    miniGameMgr.start(type);
  });
};

// 覆盖 onMiniGameEnd
GameEngine.prototype.onMiniGameEnd = function(type, score) {
  this.state.miniGameScores[type] = Math.max(this.state.miniGameScores[type] || 0, score);
  const bonusMap = { 3: {fishing: 5, happy: 5}, 2: {fishing: 3, happy: 3}, 1: {happy: 2} };
  this.state.modifyStats(bonusMap[score] || {});
  ScreenManager.transition('miniGame', 'game', () => this.afterEvent());
};

// 覆盖 renderEvent 让选择正确触发
GameEngine.prototype.renderEvent = function(event) {
  const container = document.getElementById('event-container');
  if (!container) return;
  const periodNames = { morning: '上午', noon: '午休', afternoon: '下午', overtime: '加班', evening: '19:50 晚高峰', midnight: '23:50 倒计时' };
  const cal = this.state.getCalendar();

  const fixText = (text) => {
    const playerName = this.state.playerName;
    const partnerName = playerName === '余默' ? '俞闲' : '余默';
    return text.replace(new RegExp(playerName, 'g'), '你').replace(new RegExp(partnerName, 'g'), partnerName);
  };

  const eventText = fixText(event.text);
  const choicesHtml = event.choices.map((c, i) => {
    const choiceText = fixText(c.text);
    return `<button class="choice-btn" data-idx="${i}">${choiceText}</button>`;
  }).join('');

  container.innerHTML = `
    <div class="event-title">${periodNames[this.state.period] || ''} · ${cal.date} ${cal.weekday}</div>
    <div class="event-text">${eventText}</div>
    <div class="event-choices">${choicesHtml}</div>
  `;
  container.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      game.handleChoice(idx);
    });
  });
};

// 覆盖 render
GameEngine.prototype.render = function() {
  this.renderStatusBar();
  if (this.state.currentEventId && this.eventSystem) {
    const event = this.eventSystem.getEventById(this.state.currentEventId);
    if (event) {
      this.renderEvent(event);
      return;
    }
  }
  this.renderDefaultChoices();
};

  container.innerHTML = `

      `).join('')}

  const self = this;
  container.querySelectorAll('.choice-btn').forEach(btn => {

      const idx = parseInt(btn.dataset.idx);

      self.state.modifyStats(effect);
      self.afterEvent();

  });
};

// 覆盖 advanceToNextEvent 支持小游戏触发
GameEngine.prototype.advanceToNextEvent = function() {
  if (this.state.happy < 20 && !this.state.flags['emo_' + this.state.day]) {
    this.state.flags['emo_' + this.state.day] = true;
    this.triggerEmoEvent();
    return;
  }
  if (Math.random() < 0.2) {
    const re = this.eventSystem.getRandomEvent(this.state);
    if (re) {
      this.state.currentEventId = re.id;
      this.render();
      return;
    }
  }
  const event = this.eventSystem.getEvent(this.state);
  if (event) {
    this.state.currentEventId = event.id;
    if (event.triggerMiniGame) {
      this.state.eventsCompleted.push(event.id);
      this.triggerMiniGame(event.triggerMiniGame);
      return;
    }
  } else {
    this.state.currentEventId = null;
  }
  this.render();
};

// 覆盖 handleChoice 支持 effects
GameEngine.prototype.handleChoice = function(choiceIndex) {
  const result = this.eventSystem.resolveChoice(this.state, choiceIndex);
  if (result && result.statChanges) {
    this.state.modifyStats(result.statChanges);
  }
  this.afterEvent();
};

// ============ UI 全局函数 ============
function startNewGame() {
  ScreenManager.transition('title', 'charSelect');
}

function showSaveLoad(mode) {
  const from = document.querySelector('.screen-active')?.id?.replace('screen-', '') || 'title';
  window._saveLoadFrom = from;
  window._saveLoadMode = mode;
  ScreenManager.transition(from, 'saveLoad');
  renderSaveSlots(mode);
}

function closeSaveLoad() {
  const from = window._saveLoadFrom || 'title';
  ScreenManager.transition('saveLoad', from);
}

function renderSaveSlots(mode) {
  const titleEl = document.getElementById('save-title');
  const slotsEl = document.getElementById('save-slots');
  const info = SaveSystem.getSlotInfo();
  
  titleEl.textContent = mode === 'load' ? '选择存档' : '存档管理';
  
  let html = '';
  const slotNames = { 0: '槽位 1', 1: '槽位 2', 2: '槽位 3', auto: '自动存档' };
  
  for (const slot of ['auto', 0, 1, 2]) {
    const data = info[slot];
    if (data) {
      const date = new Date(data.timestamp).toLocaleString('zh-CN');
      html += `<button class="save-slot" onclick="handleSlotClick('${slot}', '${mode}')">
        <strong>${slotNames[slot]}</strong><br>
        <span style="font-size:0.8rem;color:#aaa;">Day ${data.day} · ${data.playerName} · ${date}</span>
      </button>`;
    } else {
      html += `<button class="save-slot save-slot-empty" onclick="handleSlotClick('${slot}', '${mode}')">
        <strong>${slotNames[slot]}</strong><br><span style="font-size:0.8rem;">空</span>
      </button>`;
    }
  }
  slotsEl.innerHTML = html;
}

function handleSlotClick(slot, mode) {
  if (mode === 'load') {
    if (game.loadGame(slot)) {
      game.advanceToNextEvent();
    } else {
      alert('该槽位没有存档');
    }
  } else if (mode === 'save') {
    SaveSystem.save(slot, game.state);
    alert('存档成功');
    closeSaveLoad();
  }
}

function toggleGameMenu() {
  document.getElementById('game-menu').classList.toggle('active');
}

function resumeGame() {
  document.getElementById('game-menu').classList.remove('active');
}

function saveGame() {
  document.getElementById('game-menu').classList.remove('active');
  window._saveLoadFrom = 'game';
  window._saveLoadMode = 'save';
  ScreenManager.transition('game', 'saveLoad');
  renderSaveSlots('save');
}

function backToTitleFromMenu() {
  document.getElementById('game-menu').classList.remove('active');
  ScreenManager.transition('game', 'title');
}
